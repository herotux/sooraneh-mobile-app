name: Build Flutter APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'

      - name: Set minSdkVersion to 23
        run: sed -i 's/minSdkVersion 21/minSdkVersion 23/' android/app/build.gradle

      - name: Add INTERNET and READ_SMS permissions to AndroidManifest.xml
        run: |
          sed -i '/<manifest>/a\    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest>/a\    <uses-permission android:name="android.permission.READ_SMS" />' android/app/src/main/AndroidManifest.xml

      - name: Set app name in strings.xml (فارسی و انگلیسی)
        run: |
          STRINGS_FILE=android/app/src/main/res/values/strings.xml
          if [ ! -f "$STRINGS_FILE" ]; then
            mkdir -p $(dirname "$STRINGS_FILE")
            echo '<?xml version="1.0" encoding="utf-8"?>' > "$STRINGS_FILE"
            echo '<resources>' >> "$STRINGS_FILE"
            echo '    <string name="app_name">دریک | Daric</string>' >> "$STRINGS_FILE"
            echo '</resources>' >> "$STRINGS_FILE"
          else
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">دریک | Daric</string>|' "$STRINGS_FILE"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icon
        run: flutter pub run flutter_launcher_icons:main

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Get last Git commit message
        id: get_commit
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send APK to Telegram with commit message caption
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram secrets not set. Skipping Telegram upload."
            exit 0
          fi
          CAPTION="${{ steps.get_commit.outputs.message }}"
          CAPTION=$(echo "$CAPTION" | head -c 1000)
          echo "Sending APK to Telegram with caption:"
          echo "$CAPTION"
          URL="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
          curl -f -v -X POST \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document=@"build/app/outputs/flutter-apk/app-release.apk" \
            -F caption="$CAPTION" \
            "$URL" || echo "Warning: Failed to send to Telegram (possibly blocked or network issue)"